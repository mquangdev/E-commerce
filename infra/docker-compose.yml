version: '3.8'

volumes:
  postgres_data:

services:
  # === 0. DATABASE GHI & CDC ===
  postgres:
    image: postgres:16
    container_name: postgres-ecommerce-local
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ecommerce_local
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    command: ["postgres", "-c", "wal_level=logical"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
  # 1. ZOOKEEPER (Bắt buộc để điều phối cụm Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # 2. KAFKA (Message Broker)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      
      # Định nghĩa 2 cổng lắng nghe tách biệt
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_LISTENERS: INSIDE://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:29092,OUTSIDE://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # 3. ELASTICSEARCH (Database luồng Đọc)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.8
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Tắt bảo mật để dễ test ở local
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # Giới hạn RAM tránh treo máy
    ports:
      - "9200:9200"

  # 4. KIBANA (Giao diện UI cho Elasticsearch)
  kibana:
    image: docker.elastic.co/kibana/kibana:9.2.8
    container_name: kibana
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    
  # 5. KAFKA UI (Giao diện Web để quản lý Kafka, tạo Topic, xem Message)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8888:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      
  # 6. KAFKA CONNECT (Debezium CDC)
  debezium-connect:
    image: debezium/connect:2.4
    container_name: debezium
    depends_on:
      - kafka
      - postgres
    ports:
      - "8084:8083"
    environment:
      # Khai báo địa chỉ Kafka cho Debezium
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      
  # 7. Redis
  redis:
    image: redis:alpine
    container_name: e_commerce_redis
    ports:
      - "6379:6379" # 6379 là cổng mặc định huyền thoại của Redis
    restart: always
  # 8. Redis Insight (Siêu xe UI chính chủ của Redis)
  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis_insight
    ports:
      - "5540:5540" # Cổng mặc định của Redis Insight phiên bản mới
    restart: always