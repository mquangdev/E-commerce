version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres-ecommerce-local
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ecommerce_local
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    # Bật tính năng ghi nhật ký Logical cho Debezium (CDC)
    command: ["postgres", "-c", "wal_level=logical"]
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: