server:
  port: 8088

jwt:
  secret: V2h5RG9Zb3VIYXZlVG9CZVNvU2VyaW91czEyMzQ1Njc4OTA=

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]': # Áp dụng cho mọi đường dẫn API
                allowedOrigins:
                  - "http://localhost:3000"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*" # Cho phép mọi header
                allowCredentials: true # Cho phép gửi kèm cookie/authorization header
                maxAge: 3600
          routes:
            # 1. TUYEN DUONG PUBLIC (Khong can JWT, chi can Secret)
            - id: auth-service-route
              uri: lb://auth-service
              predicates:
                - Path=/auth/**
              filters:
                - AddRequestHeader=X-Gateway-Secret, lX4.G9-SecretKey-0ag6o
                - RewritePath=/auth/(?<segment>.*), /$1

            # 2. TUYEN DUONG PROTECTED (Bat buoc phai co JWT hop le)
            - id: catalog-service-route
              uri: lb://catalog-service
              predicates:
                - Path=/catalog/**
              filters:
                - AddRequestHeader=X-Gateway-Secret, lX4.G9-SecretKey-0ag6o
                - JwtAuth
                - RewritePath=/catalog/(?<segment>.*), /$1

            - id: order-service-route
              uri: lb://order-service
              predicates:
                - Path=/order/**
              filters:
                - AddRequestHeader=X-Gateway-Secret, lX4.G9-SecretKey-0ag6o
                - JwtAuth
                - RewritePath=/order/(?<segment>.*), /$1

            - id: payment-service-route
              uri: lb://payment-service
              predicates:
                - Path=/payment/**
              filters:
                - AddRequestHeader=X-Gateway-Secret, lX4.G9-SecretKey-0ag6o
                - JwtAuth
                - RewritePath=/payment/(?<segment>.*), /$1

            - id: inventory-service-route
              uri: lb://inventory-service
              predicates:
                - Path=/inventory/**
              filters:
                - AddRequestHeader=X-Gateway-Secret, lX4.G9-SecretKey-0ag6o
                - JwtAuth
                - RewritePath=/inventory/(?<segment>.*), /$1

            - id: search-service-route
              uri: lb://search-service
              predicates:
                - Path=/search/**
              filters:
                - AddRequestHeader=X-Gateway-Secret, lX4.G9-SecretKey-0ag6o
                - JwtAuth
                - RewritePath=/search/(?<segment>.*), /$1

            # === CẤU HÌNH GRAPHQL CHO AUTH SERVICE ===
            - id: auth-graphql-route
              uri: lb://auth-service
              predicates:
                - Path=/auth/graphql
              filters:
                - 'AddRequestHeader=X-Gateway-Secret, lX4.G9-SecretKey-0ag6o'
                - RewritePath=/auth/(?<segment>.*), /$1

            # === CẤU HÌNH GRAPHQL CHO CATALOG SERVICE ===
            - id: catalog-graphql-route
              uri: lb://catalog-service
              predicates:
                - Path=/catalog/graphql
              filters:
                - 'AddRequestHeader=X-Gateway-Secret, lX4.G9-SecretKey-0ag6o'
                - RewritePath=/catalog/(?<segment>.*), /$1
eureka:
  instance:
    prefer-ip-address: true # Ưu tiên đăng ký bằng IP thay vì tên máy
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

logging:
  level:
    # 🕵️‍♂️ Theo dõi cách Gateway khớp tuyến đường (Route) và chạy các Filter
    org.springframework.cloud.gateway: TRACE

    # 🌐 Xem chi tiết các Request/Response HTTP ra vào môi trường WebFlux
    org.springframework.http.server.reactive: DEBUG

    # ⚖️ Xem quá trình Load Balancer (lb://) hỏi Eureka để tìm địa chỉ IP
    org.springframework.cloud.loadbalancer: DEBUG