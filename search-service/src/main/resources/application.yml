server:
  port: 8000

spring:
  application:
    name: search-service

  elasticsearch:
    uris: http://localhost:9200 # Port ket noi cua Elasticsearch trong Docker

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis

  kafka:
    bootstrap-servers: localhost:9092

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka